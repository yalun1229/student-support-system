<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <h1>留学生支援システム</h1>

    <form method="POST">

        <label>ユーザー名：</label>
        <input type="text" name="username" required>

        <br><br>

        <label>パスワード：</label>
        <input type="password" name="password" required>

        <br><br>

        <button type="submit">ログイン</button>

    </form>

    {% if error %}
        <p style="color:red;">{{ error }}</p>
    {% endif %}

</body>
</html>
