<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>対話型専門学習支援システム</title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}"
    >
</head>

<body>

<section class="hero-section">

    <button
        type="button"
        class="lang-btn"
        onclick="toggleLang()"
    >
        🌐 日本語 / English
    </button>

    <div class="hero-content">

        <p class="hero-badge" id="badge">
            RESEARCH PROTOTYPE
        </p>

        <h1 id="title">
            対話型専門学習<br>
            支援システム
        </h1>

        <p class="hero-text" id="description">
            留学生が専門用語や授業内容について質問し、
            自分の理解度に合った説明を受けることを目的とした
            生成AI活用型の学習支援システムです。
        </p>

        <p class="hero-note" id="note">
            現在は学習記録・目標管理機能を実装し、
            対話型質問支援機能を開発しています。
        </p>

        <div class="hero-buttons">

            <a
                href="{{ url_for('login') }}"
                class="btn-primary"
                id="startBtn"
            >
                システムを体験する
            </a>

            <a
                href="{{ url_for('dashboard') }}"
                class="btn-secondary"
                id="dashboardBtn"
            >
                ダッシュボード
            </a>

        </div>

    </div>

    <div class="hero-card">

        <div class="preview-header">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <div class="preview-body">

            <p class="prototype-label" id="prototypeLabel">
                対話型学習支援
            </p>

            <h3 id="supportTitle">
                分からない内容を、<br>
                自分に合った説明へ。
            </h3>

            <div class="support-preview">

                <div class="question-preview">
                    <span>質問</span>
                    <p id="questionText">
                        外部キーとは何ですか？
                    </p>
                </div>

                <div class="answer-preview">
                    <span>説明</span>
                    <p id="answerText">
                        外部キーは、別のテーブルにあるデータとの
                        関係を作るために使用する項目です。
                    </p>
                </div>

            </div>

            <div class="feedback-preview">

                <button type="button" id="understoodBtn">
                    理解できた
                </button>

                <button type="button" id="simpleBtn">
                    もっと簡単に
                </button>

                <button type="button" id="exampleBtn">
                    具体例がほしい
                </button>

            </div>

            <div class="feature-status">

                <div>
                    <span>📚</span>
                    <p id="recordFeature">学習記録</p>
                    <strong id="recordStatus">実装済み</strong>
                </div>

                <div>
                    <span>💬</span>
                    <p id="dialogFeature">対話支援</p>
                    <strong id="dialogStatus">開発中</strong>
                </div>

                <div>
                    <span>👍</span>
                    <p id="feedbackFeature">理解度評価</p>
                    <strong id="feedbackStatus">開発予定</strong>
                </div>

            </div>

        </div>

    </div>

</section>

<script>
    let currentLang = "ja";

    function toggleLang() {
        if (currentLang === "ja") {
            document.documentElement.lang = "en";

            document.getElementById("badge").textContent =
                "RESEARCH PROTOTYPE";

            document.getElementById("title").innerHTML =
                "Interactive Specialized Learning<br>Support System";

            document.getElementById("description").textContent =
                "A generative AI-based learning support system designed to help international students ask questions about technical terms and course content and receive explanations suited to their level of understanding.";

            document.getElementById("note").textContent =
                "Learning record and goal management features have been implemented, while interactive question support is currently under development.";

            document.getElementById("startBtn").textContent =
                "Try the System";

            document.getElementById("dashboardBtn").textContent =
                "Dashboard";

            document.getElementById("prototypeLabel").textContent =
                "Interactive Learning Support";

            document.getElementById("supportTitle").innerHTML =
                "Turn difficult content into<br>clear explanations.";

            document.getElementById("questionText").textContent =
                "What is a foreign key?";

            document.getElementById("answerText").textContent =
                "A foreign key is a field used to create a relationship with data stored in another table.";

            document.getElementById("understoodBtn").textContent =
                "I understand";

            document.getElementById("simpleBtn").textContent =
                "Explain more simply";

            document.getElementById("exampleBtn").textContent =
                "Show an example";

            document.getElementById("recordFeature").textContent =
                "Learning Records";

            document.getElementById("recordStatus").textContent =
                "Implemented";

            document.getElementById("dialogFeature").textContent =
                "Dialogue Support";

            document.getElementById("dialogStatus").textContent =
                "In Development";

            document.getElementById("feedbackFeature").textContent =
                "Understanding Feedback";

            document.getElementById("feedbackStatus").textContent =
                "Planned";

            currentLang = "en";

        } else {
            document.documentElement.lang = "ja";

            document.getElementById("badge").textContent =
                "RESEARCH PROTOTYPE";

            document.getElementById("title").innerHTML =
                "対話型専門学習<br>支援システム";

            document.getElementById("description").textContent =
                "留学生が専門用語や授業内容について質問し、自分の理解度に合った説明を受けることを目的とした生成AI活用型の学習支援システムです。";

            document.getElementById("note").textContent =
                "現在は学習記録・目標管理機能を実装し、対話型質問支援機能を開発しています。";

            document.getElementById("startBtn").textContent =
                "システムを体験する";

            document.getElementById("dashboardBtn").textContent =
                "ダッシュボード";

            document.getElementById("prototypeLabel").textContent =
                "対話型学習支援";

            document.getElementById("supportTitle").innerHTML =
                "分からない内容を、<br>自分に合った説明へ。";

            document.getElementById("questionText").textContent =
                "外部キーとは何ですか？";

            document.getElementById("answerText").textContent =
                "外部キーは、別のテーブルにあるデータとの関係を作るために使用する項目です。";

            document.getElementById("understoodBtn").textContent =
                "理解できた";

            document.getElementById("simpleBtn").textContent =
                "もっと簡単に";

            document.getElementById("exampleBtn").textContent =
                "具体例がほしい";

            document.getElementById("recordFeature").textContent =
                "学習記録";

            document.getElementById("recordStatus").textContent =
                "実装済み";

            document.getElementById("dialogFeature").textContent =
                "対話支援";

            document.getElementById("dialogStatus").textContent =
                "開発中";

            document.getElementById("feedbackFeature").textContent =
                "理解度評価";

            document.getElementById("feedbackStatus").textContent =
                "開発予定";

            currentLang = "ja";
        }
    }
</script>

</body>
</html>
