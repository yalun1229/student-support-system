<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>留学生学習支援システム</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <h1>留学生学習支援Webシステム</h1>

    <p>
        このシステムは、留学生の学習記録、目標管理、学習時間の可視化を支援するWebアプリケーションです。
    </p>

    <h2>主な機能</h2>

    <ul>
        <li>学習記録の追加・編集・削除</li>
        <li>学習時間のグラフ表示</li>
        <li>学習目標と達成率の管理</li>
        <li>ログイン機能</li>
    </ul>

    <a href="/login">
        <button>システムを開始する</button>
    </a>

</body>
</html>
