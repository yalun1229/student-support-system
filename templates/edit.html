<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>学習記録編集｜留学生向け専門学習支援システム</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="navbar">
        <a href="/dashboard">学習ダッシュボード</a>
        <a href="/goals">学習目標</a>
        <a href="/logout">ログアウト</a>
    </div>

    <h1>専門学習内容の編集</h1>

    <p class="subtitle">
        登録した専門学習の内容や学習時間を修正する画面です。
    </p>

    <h2>学習記録の修正</h2>

    <form method="POST" class="study-form">

        <label>科目名・学習内容</label>
        <input type="text" name="subject" value="{{ record[1] }}" required>

        <label>学習時間</label>
        <input type="number" name="hours" value="{{ record[2] }}" required>

        <button type="submit">記録を更新する</button>

    </form>

    <a href="/dashboard">
        <button type="button">ダッシュボードに戻る</button>
    </a>

</body>
</html>
