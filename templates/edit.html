{% extends "base.html" %}

{% block title %}Edit Record｜EduBridge AI{% endblock %}

{% block body_class %}edit-page{% endblock %}

{% block content %}

<main class="edit-container">

    <section class="edit-card">

        <p class="hero-badge">Edit Record</p>

        <h1>学習記録を編集</h1>

        <p class="edit-subtitle">
            科目名や学習時間を修正できます。
        </p>

        <form method="POST" class="study-form">

            <label>科目名・学習内容</label>
            <input
                type="text"
                name="subject"
                value="{{ record[1] }}"
                required
            >

            <label>学習時間</label>
            <input
                type="number"
                name="hours"
                value="{{ record[2] }}"
                required
            >

            <button type="submit">
                更新する
            </button>

        </form>

        <a href="/dashboard" class="back-link">
            ダッシュボードに戻る
        </a>

    </section>

</main>

{% endblock %}
